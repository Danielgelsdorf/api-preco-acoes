name: Test & Build
on:
push:
branches:
  - main
pull_request:
branches:
  - main
jobs:
test:
runs-on: ubuntu-latest
steps:
  - name: Checkout code
uses: actions/checkout@v4
with:
fetch-depth: 0
  - name: Set up JDK 17
    uses: actions/setup-java@v4
    with:
      java-version: '17'
      distribution: 'temurin'
      cache: 'maven'

  - name: Run tests with Maven
    run: mvn test

build:
runs-on: ubuntu-latest
needs: test
if: success()
steps:
  - name: Checkout code
uses: actions/checkout@v4
with:
fetch-depth: 0
  - name: Set up JDK 17
    uses: actions/setup-java@v4
    with:
      java-version: '17'
      distribution: 'temurin'
      cache: 'maven'

  - name: Build with Maven
    run: mvn clean package