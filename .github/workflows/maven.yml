name: Test, Build & SonarCloud
on:
push:
branches:
  - main
pull_request:
branches:
  - main
jobs:
test_and_build:
name: Test and Build
runs-on: ubuntu-latest
steps:
  - name: Checkout code
uses: actions/checkout@v4
with:
fetch-depth: 0
               - name: Set up JDK 17
               uses: actions/setup-java@v4
               with:
                 java-version: '17'
                 distribution: 'temurin'
                 cache: 'maven'

               - name: Build and Test with Maven
                 run: mvn clean verify

sonarcloud:
name: SonarCloud Analysis
runs-on: ubuntu-latest
needs: test_and_build
steps:
  - name: Checkout code
uses: actions/checkout@v4
with:
fetch-depth: 0
               - name: Set up JDK 17
               uses: actions/setup-java@v4
               with:
                 java-version: '17'
                 distribution: 'temurin'
                 cache: 'maven'

               - name: Cache SonarCloud packages
                 uses: actions/cache@v3
                 with:
                   path: ~/.sonar/cache
                   key: ${{ runner.os }}-sonar
                   restore-keys: ${{ runner.os }}-sonar

               - name: Analyze with SonarCloud
                 env:
                   GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                   SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
                 run: mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=Danielgelsdorf_api-preco-acoes