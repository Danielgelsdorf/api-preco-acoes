name: Java CI com Maven

on:
  push:
    branches: [ "feature/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build e Testes com Maven
        run: mvn -B package --file pom.xml

      - name: Upload do artefato
        uses: actions/upload-artifact@v4
        with:
          name: api-acoes-jar
          path: target/*.jar

  open-pr:
    needs: build
    if: github.event_name == 'push' && contains(github.ref, 'refs/heads/feature/')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Checkout do código (Full History)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
          base: main
          title: "🚀 Auto-PR: Integração de ${{ github.ref_name }}"
          body: |
            ### 🤖 Automação de DevOps (Fase 2)
            PR aberto automaticamente após o sucesso do pipeline de CI.
          labels: |
            automated-pr